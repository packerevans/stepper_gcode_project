<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi System Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* * --- HIGH-TECH MODERN TERMINAL STYLES --- 
         * Square edges, high contrast, minimalist vibe
         */

        /* --- Root Variables (Light Mode: Black & White) --- */
        :root {
            --color-primary: #000000;
            --color-secondary: #333333;
            --color-background: #ffffff; 
            --color-surface: #ffffff; 
            --color-text: #000000;
            --color-accent: #000000;
            --color-border: #000000;
            --color-shadow: rgba(0, 0, 0, 0.1);

            /* Terminal Colors (Light) */
            --color-terminal-bg: #f5f5f5;
            --color-terminal-text: #000000;
            --color-terminal-prompt: #000000;

            --border-radius: 0px; /* Force Square */
        }

        /* --- Dark Mode Variables (Black & Green) --- */
        body[data-theme='dark'] {
            --color-background: #000000;
            --color-surface: #0a0a0a;
            --color-text: #00ff00;
            --color-accent: #00ff00;
            --color-secondary: #008800;
            --color-border: #00ff00;
            --color-shadow: rgba(0, 255, 0, 0.1);

            /* Terminal Colors (Dark) */
            --color-terminal-bg: #000000;
            --color-terminal-text: #00ff00;
            --color-terminal-prompt: #00ff00;
        }

        /* --- Base Styles --- */
        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            background: var(--color-background);
            color: var(--color-text);
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase; /* Tech vibe */
            letter-spacing: 1px;
        }

        /* --- Global Navigation --- */
        .main-nav {
            z-index: 2000;
            background: var(--color-background);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px 0;
            border-bottom: 2px solid var(--color-border);
        }

        .main-nav a {
            text-decoration: none;
            color: var(--color-text);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.65rem;
            font-weight: 700;
            opacity: 0.6;
            transition: opacity 0.2s, background 0.2s;
            flex: 1;
            padding: 5px 0;
        }

        .main-nav a:hover, .main-nav a.active {
            opacity: 1;
            background: var(--color-text);
            color: var(--color-background);
        }

        .main-nav .icon {
            font-size: 1.2rem;
            margin-bottom: 4px;
        }

        /* Mobile: Bottom Nav */
        @media (max-width: 768px) {
            .main-nav {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                border-top: 2px solid var(--color-border);
                border-bottom: none;
            }
            body { padding-bottom: 80px !important; } 
        }

        .main-content {
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* --- Custom Button Styles --- */
        .btn-action {
            background-color: transparent;
            color: var(--color-text);
            border: 2px solid var(--color-border);
            padding: 12px 24px;
            border-radius: 0; /* Square */
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 700;
            text-transform: uppercase;
        }

        .btn-action:hover {
            background-color: var(--color-text);
            color: var(--color-background);
        }

        /* Destructive actions just get a slightly thicker border or distinct hover */
        .btn-danger {
            border-width: 3px;
        }
        
        body[data-theme='dark'] .btn-danger:hover {
            background-color: #ff0000;
            border-color: #ff0000;
            color: #000;
        }

        /* --- Terminal Log Styling --- */
        #log {
            background: var(--color-terminal-bg);
            color: var(--color-terminal-text);
            padding: 20px;
            border: 2px solid var(--color-border);
            height: 60vh;
            overflow-y: scroll;
            white-space: pre-wrap;
            font-family: inherit;
            font-size: 13px;
            margin-top: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--color-border) var(--color-background);
        }

        /* --- Password Screen --- */
        #loginScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--color-background);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 3000;
        }
        
        #loginScreen.hidden {
            display: none !important;
        }

        #loginBox {
            padding: 40px;
            border: 2px solid var(--color-border);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        #loginBox h2 {
            margin-bottom: 30px;
            font-size: 1.5rem;
            letter-spacing: 4px;
        }

        #passwordInput {
            padding: 15px;
            border: 2px solid var(--color-border);
            border-radius: 0;
            width: 100%;
            margin-bottom: 20px;
            font-size: 20px;
            background: transparent;
            color: var(--color-text);
            text-align: center;
            font-family: inherit;
        }

        #passwordInput:focus {
            outline: none;
            background: var(--color-text);
            color: var(--color-background);
        }

        #errorMsg {
            color: #ff0000;
            margin-top: 20px;
            font-size: 0.8rem;
        }

        /* Theme Toggle */
        #themeToggle {
            position: fixed; top: 15px; right: 15px; background: transparent;
            color: var(--color-text); border: 2px solid var(--color-border);
            padding: 0; z-index: 2500;
            width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
        }
        
        #themeToggle:hover {
            background: var(--color-text);
            color: var(--color-background);
        }

        .header-row h2 {
            border-left: 10px solid var(--color-border);
            padding-left: 20px;
        }

        #terminalInput {
            border-radius: 0;
            border: 2px solid var(--color-border);
            background: transparent;
            color: var(--color-text);
            padding: 15px;
            font-family: inherit;
        }

        #terminalInput:focus {
            outline: none;
            border-style: dashed;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .system-actions {
                display: grid;
                grid-template-columns: 1fr 1fr;
                width: 100%;
                gap: 10px;
            }
            .btn-action { padding: 10px 5px; font-size: 12px; }
        }
    </style>
</head>
<body data-theme="light">
    
     <button id="themeToggle" onclick="toggleTheme()">
        <span id="themeIcon">☀️</span>
    </button>

    <div class="main-content content-hidden" id="mainContent">
        <nav class="main-nav">
            <a href="/" id="nav-designs"><span class="icon">🎨</span><span>Designs</span></a>
            <a href="/controller" id="nav-controller"><span class="icon">🕹️</span><span>Control</span></a>
            <a href="/sketch" id="nav-sketch"><span class="icon">✏️</span><span>Sketch</span></a>
            <a href="/AI_builder" id="nav-ai"><span class="icon">🤖</span><span>AI</span></a>
            <a href="/led_controls" id="nav-leds"><span class="icon">💡</span><span>LEDs</span></a>
            <a href="/terminal" id="nav-terminal"><span class="icon">🖥️</span><span>Console</span></a>
            <a href="/settings" id="nav-settings"><span class="icon">⚙️</span><span>Settings</span></a>
        </nav>
        
        <div class="header-row flex flex-col md:flex-row items-center justify-between mb-5">
            <h2 class="text-3xl font-light text-center mb-4 md:mb-0 text-secondary">System Console</h2>

            <div class="system-actions flex gap-2 flex-wrap justify-center mb-6">
                
                <button id="updateBtn" class="btn-action" onclick="sendCommand('/update_firmware', 'Update Firmware')">
                    Update FW
                </button>

                <button id="pullBtn" class="btn-action" onclick="sendCommand('/pull', 'Git Pull')">
                    Git Pull
                </button>

                <button id="resetAppBtn" class="btn-action btn-danger" onclick="sendCommand('/restart_app', 'Reset App')">
                    Reset App
                </button>
                
                <button id="rebootBtn" class="btn-action btn-danger" onclick="sendCommand('/reboot', 'Reboot')">
                    Reboot
                </button>
                
                <button id="shutdownBtn" class="btn-action btn-danger" onclick="sendCommand('/shutdown', 'Shutdown')">
                    Shutdown
                </button>
            </div>
        </div>

        <div id="flashMessages" class="min-h-10">
            </div>

        <div id="log">Awaiting command line output...</div>

        <!-- Terminal Input Box -->
        <div class="mt-6 flex gap-0">
            <input type="text" id="terminalInput" class="flex-grow p-4 bg-transparent border-2 border-current focus:outline-none" placeholder="Enter command (e.g., CALIBRATE, SPEED 1.5, 0,255,0)" onkeydown="if(event.key==='Enter') sendManualCommand()">
            <button class="btn-action" style="border-left: none;" onclick="sendManualCommand()">Send</button>
        </div>
    </div>

    <div id="loginScreen" class="absolute">
        <div id="loginBox">
    <h2>System Access Required</h2>
        <img src="{{ url_for('static', filename='terminal.png') }}" class="mx-auto mb-5" width="400" height="400">


            <input type="password" id="passwordInput" placeholder="Access Code" onkeydown="handleKey(event)">
            <button class="btn-action w-full" onclick="checkPassword()">Unlock</button>
            <p id="errorMsg"></p>
        </div>
    </div>

    <script>
        // Constants for localStorage keys
        const AUTH_KEY = 'pi_console_authenticated';
        const THEME_KEY = 'pi_console_theme';
        const CORRECT_PASSWORD = "2025";
        const MAIN_CONTENT = document.getElementById("mainContent");
        const LOGIN_SCREEN = document.getElementById("loginScreen");
        const THEME_TOGGLE = document.getElementById('themeToggle');

        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            checkAuthStatus(); // Now only controls content visibility
            
            // Set active nav link
            const path = window.location.pathname;
            const navMap = {
                '/': 'nav-designs',
                '/designs': 'nav-designs',
                '/controller': 'nav-controller',
                '/sketch': 'nav-sketch',
                '/AI_builder': 'nav-ai',
                '/led_controls': 'nav-leds',
                '/terminal': 'nav-terminal',
                '/settings': 'nav-settings'
            };
            const activeId = navMap[path] || 'nav-designs';
            const el = document.getElementById(activeId);
            if (el) el.classList.add('active');

            setInterval(fetchLogs, 2000);
            fetchLogs();
        });

        function initTheme() {
            const savedTheme = localStorage.getItem(THEME_KEY) || 'light';
            document.body.setAttribute('data-theme', savedTheme);
            // FIX: Use emojis instead of words
            THEME_TOGGLE.textContent = savedTheme === 'dark' ? '🌙' : '☀️';
        }

        function toggleTheme() {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem(THEME_KEY, newTheme);
            // FIX: Use emojis instead of words
            THEME_TOGGLE.textContent = newTheme === 'dark' ? '🌙' : '☀️';
        }

        function checkAuthStatus() {
            if (localStorage.getItem(AUTH_KEY) === 'true') {
                LOGIN_SCREEN.classList.add("hidden");
                MAIN_CONTENT.classList.remove("content-hidden");
                MAIN_CONTENT.classList.add("content-visible");
            } else {
                LOGIN_SCREEN.classList.remove("hidden");
                MAIN_CONTENT.classList.remove("content-visible");
                MAIN_CONTENT.classList.add("content-hidden");
            }
        }

        function handleKey(event) {
            if (event.key === 'Enter') {
                checkPassword();
            }
        }

        async function checkPassword() {
            const input = document.getElementById("passwordInput").value;
            const errorMsg = document.getElementById("errorMsg");
            errorMsg.innerText = '';

            if (input === CORRECT_PASSWORD) {
                localStorage.setItem(AUTH_KEY, 'true');
                LOGIN_SCREEN.classList.add("hidden");
                MAIN_CONTENT.classList.remove("content-hidden");
                MAIN_CONTENT.classList.add("content-visible");
                document.getElementById("passwordInput").value = '';
            } else {
                errorMsg.innerText = "Access Denied. Try again.";
                document.getElementById("passwordInput").value = '';
                document.getElementById("passwordInput").focus();
            }
        }

        async function flashMessage(message, category = 'info') {
            const msgDiv = document.getElementById("flashMessages");
            // Adjusted color classes to be consistent with the khaki/tan theme
            const colorClass = category === 'info' ? 'text-green-700 bg-green-100 border-green-300' : 'text-red-700 bg-red-100 border-red-300';
            
            // Create a styled alert box
            msgDiv.innerHTML = `<p class="${colorClass} font-semibold p-3 rounded-lg shadow-md border">${message}</p>`;
            
            // Clear message after 5 seconds
            setTimeout(() => { msgDiv.innerHTML = ''; }, 5000);
        }

        // --- Improved Command Sender for Robust Error Handling ---
        async function sendCommand(url, commandName) {
            if (localStorage.getItem(AUTH_KEY) !== 'true') {
                LOGIN_SCREEN.classList.remove("hidden");
                flashMessage("Authentication required to run system commands.", "error");
                return;
            }

            if (!window.confirm(`Are you sure you want to run '${commandName}'? This action is IRREVERSIBLE.`)) {
                return;
            }
            
            flashMessage(`Executing ${commandName}...`, 'info');
            
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                
                let data = { success: false, message: 'Server error: Could not parse response.' };
                
                const contentType = res.headers.get("content-type");
                
                if (contentType && contentType.includes("application/json")) {
                    data = await res.json();
                } else {
                    const text = await res.text();
                    data.message = `Command failed: Server returned an unexpected response (Status ${res.status}). Check Flask logs.`;
                    console.error("Non-JSON Server Response for command:", commandName, "\nResponse Text:", text);
                }

                if (res.ok && data.success) {
                    flashMessage(`${commandName} initiated successfully: ${data.message || 'Success.'}`, 'info');
                } else {
                    flashMessage(`${commandName} FAILED: ${data.message || 'An unknown server error occurred.'}`, 'error');
                }
            } catch (error) {
                flashMessage(`Network connection error for ${commandName}: ${error.message}`, 'error');
                console.error(`Fetch error for ${commandName}:`, error);
            }
        }

        async function sendManualCommand() {
            const input = document.getElementById("terminalInput");
            const cmd = input.value.trim();
            if (!cmd) return;

            if (localStorage.getItem(AUTH_KEY) !== 'true') {
                LOGIN_SCREEN.classList.remove("hidden");
                flashMessage("Authentication required to send commands.", "error");
                return;
            }

            try {
                const res = await fetch('/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd })
                });
                const data = await res.json();
                if (data.success) {
                    input.value = '';
                    // No need to flash success, it'll show up in logs anyway
                } else {
                    flashMessage("Failed to send command.", "error");
                }
            } catch (error) {
                flashMessage("Network error: " + error.message, "error");
            }
        }

        async function fetchLogs() {
            try {
                const res = await fetch("/terminal/logs");
                if (!res.ok) throw new Error('Network response was not ok');
                const data = await res.json();
                
                const logElement = document.getElementById("log");
                const isScrolledToBottom = logElement.scrollHeight - logElement.clientHeight <= logElement.scrollTop + 1;

                logElement.textContent = data.join("\n");
                
                if (isScrolledToBottom) {
                    logElement.scrollTop = logElement.scrollHeight;
                }

            } catch (error) {
                const logElement = document.getElementById("log");
                if (!logElement.textContent.includes("Loading")) {
                     logElement.textContent += `\n[ERROR] Failed to fetch logs: ${error.message}`;
                }
            }
        }

    </script>
</body>
</html>
